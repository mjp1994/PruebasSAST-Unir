name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: "20.x"
  DOCKER_IMAGE_NAME: juice-shop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Caches ~/.npm across runs. Cache key is based on the lockfile so
          # it invalidates automatically whenever dependencies change.
          cache: "npm"

      - run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm test
        continue-on-error: true

      - run: npm run build:server

      - name: Build & save Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} .
          docker save ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} -o juice-shop-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: juice-shop-image.tar
          retention-days: 1

  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          # Caches the pip download cache. Key includes the semgrep version
          # string so upgrading semgrep automatically busts the cache.
          cache: "pip"

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --json --output semgrep-results.json || true
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: semgrep-results.json
          retention-days: 7

  sca:
    name: SCA
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i juice-shop-image.tar

      # Trivy downloads its vulnerability DB on every run (~30-50 MB).
      # Caching it under a date-based key means it refreshes once per day
      # rather than on every push, which is a meaningful time saving.
      - name: Cache Trivy vulnerability DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-${{ runner.os }}-
        id: trivy-cache

      - name: Get current date (for Trivy cache key)
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          format: "json"
          output: "trivy-fs-results.json"
          # Tell Trivy to use (and populate) the cache directory above.
          cache-dir: ~/.cache/trivy
        continue-on-error: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}"
          scanners: "vuln"
          format: "json"
          output: "trivy-image-results.json"
          cache-dir: ~/.cache/trivy
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Generate lock files for Dependency-Check
        run: |
          npm install --package-lock-only --ignore-scripts
          cd frontend && npm install --package-lock-only --ignore-scripts

      # The Dependency-Check NVD database is large (~300-500 MB) and is
      # re-downloaded from scratch on every run without caching. A daily
      # cache key keeps it fresh for security purposes while avoiding the
      # full download on every push. The restore-keys fallback means a
      # slightly stale DB is used if today's cache hasn't been populated yet
      # (e.g. first run of the day), which is acceptable for a CI pipeline.
      - name: Cache OWASP Dependency-Check DB
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          key: dep-check-db-${{ runner.os }}-${{ steps.depcheck-date.outputs.date }}
          restore-keys: |
            dep-check-db-${{ runner.os }}-

      - name: Get current date (for Dependency-Check cache key)
        id: depcheck-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "juice-shop"
          path: "."
          format: "XML"
          out: "."
          args: '--exclude "**/test/files/**" --data ~/.dependency-check/data'
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            trivy-fs-results.json
            trivy-image-results.json
            dependency-check-report.xml
          retention-days: 7

  dast:
    name: DAST
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i juice-shop-image.tar

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 $DOCKER_IMAGE_NAME:${{ github.sha }}
          for i in {1..30}; do
            curl -sf http://localhost:3000 > /dev/null && break
            [ $i -eq 30 ] && exit 1
            sleep 5
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-j -x report_xml.xml"
          allow_issue_writing: false
        continue-on-error: true

      - name: Stop Juice Shop
        if: always()
        run: docker stop juice-shop && docker rm juice-shop

      - uses: actions/upload-artifact@v4
        with:
          name: dast-results
          path: |
            report_html.html
            report_json.json
            report_xml.xml
          retention-days: 7

  defectdojo-upload:
    name: DefectDojo Upload
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sast-results
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: sca-results
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: dast-results
        continue-on-error: true

      - name: Upload to DefectDojo
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_TOKEN: ${{ secrets.DEFECTDOJO_API_TOKEN }}
          PRODUCT_NAME: "OWASP Juice Shop"
          ENGAGEMENT_NAME: "CI/CD Security Scans"
          BUILD_ID: "${{ github.run_id }}"
          COMMIT_HASH: "${{ github.sha }}"
          BRANCH_TAG: "${{ github.ref_name }}"
          SOURCE_CODE_MANAGEMENT_URI: "${{ github.server_url }}/${{ github.repository }}"
        run: |
          chmod +x .github/scripts/defectdojo-upload.sh
          .github/scripts/defectdojo-upload.sh
        continue-on-error: true

      - name: Summary
        run: |
          echo "## DefectDojo Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Engagement**: CI/CD Security Scans" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY